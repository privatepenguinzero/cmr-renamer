name: Build Windows Executable

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # needed for uploading release assets

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # fetch all tags

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install uv
      run: |
        pip install uv

    - name: Sync dependencies
      run: |
        uv sync

    - name: Install PyInstaller (for building)
      run: |
        uv add --dev pyinstaller

    - name: Build executable with PyInstaller
      run: |
        uv run pyinstaller --onefile --windowed --name cmr-renamer watcher.py

    - name: Verify executable exists
      run: |
        if not exist dist\cmr-renamer.exe (
          echo Executable not found!
          exit 1
        ) else (
          echo Executable built successfully.
        )

    - name: Upload executable as artifact
      uses: actions/upload-artifact@v4
      with:
        name: cmr-renamer-windows-exe
        path: dist\cmr-renamer.exe

    - name: Upload release asset
      uses: softprops/action-gh-release@v2
      with:
        files: dist\cmr-renamer.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}