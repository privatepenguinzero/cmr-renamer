name: Build Windows Executable

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed for uploading release assets

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      # 2️⃣ Set up Python 3.10
      - name: Set up Python 3.10
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.10"

      # 3️⃣ Install uv
      - name: Install uv
        run: pip install --upgrade uv
        shell: pwsh

      # 4️⃣ Add PyInstaller (must be before sync so it's in the lock file)
      - name: Add PyInstaller
        run: uv add --dev pyinstaller
        shell: pwsh

      # 5️⃣ Sync all dependencies
      - name: Sync dependencies
        run: uv sync
        shell: pwsh

      # 6️⃣ Install Tesseract OCR (required by pytesseract)
      - name: Install Tesseract OCR
        run: choco install -y tesseract
        shell: cmd

      # 7️⃣ Build executable
      #     --windowed = no console by default (background mode)
      #     if config.ini is missing, the app allocates a console for setup
      - name: Build executable
        run: |
          uv run -- pyinstaller --onefile --windowed --name cmr-renamer --icon=assets/icon.ico --add-data "assets/icon.ico;assets" main.py
        shell: pwsh

      # 8️⃣ Verify executable exists
      - name: Verify executable
        id: verify
        run: |
          if (-not (Test-Path "dist\\cmr-renamer.exe")) {
            Write-Error "Executable not found!"
            exit 1
          } else {
            Write-Host "✅ Executable built successfully."
          }
        shell: pwsh

      # 9️⃣ Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cmr-renamer-windows-exe
          path: dist\cmr-renamer.exe

      # 🔟 Attach to release
      - name: Publish release asset
        uses: softprops/action-gh-release@v3.0.2
        with:
          files: dist\cmr-renamer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}