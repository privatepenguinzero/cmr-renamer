name: Build Windows Executable

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install uv
      run: |
        pip install uv

    - name: Sync dependencies
      run: |
        uv sync

    - name: Install PyInstaller (for building)
      run: |
        uv add --dev pyinstaller

    - name: Build executable with PyInstaller
      run: |
        uv run pyinstaller --onefile --windowed watcher.py

    - name: Rename executable
      run: |
        ren dist\watcher.exe cmr-renamer.exe

    - name: Upload executable as artifact
      uses: actions/upload-artifact@v4
      with:
        name: cmr-renamer-windows-exe
        path: dist\cmr-renamer.exe

    - name: Create Release (if not already created) and upload asset
      if: github.event_name == 'release' && github.event.action == 'published'
      uses: softprops/action-gh-release@v2
      with:
        files: dist\cmr-renamer.exe
        # The release is already created by the trigger, we just upload the asset
        # If we need to create a release, we can use the release created by the trigger.
        # The action will upload to the release that triggered the workflow.